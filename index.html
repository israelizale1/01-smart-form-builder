<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Form Builder</title>

  <link rel="stylesheet" href="./assets/styles/main.css">
</head>
<body>

  <main class="container">

    <header>
      <h1>Smart Form Builder</h1>
      <p>Reusable form with validation and JSON output</p>
    </header>

    <form id="user-form">

      <div class="form-group">
        <label for="firstName">First Name</label>
        <input
          type="text"
          id="firstName"
          name="firstName"
        >
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input
          type="text"
          id="lastName"
          name="lastName"
        >
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
        >
      </div>

      <div class="form-group">
        <label for="confirmPassword">
          Confirm Password
        </label>

        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
        >
      </div>

      <button type="submit">
        Generate JSON
      </button>

    </form>

    <section>

      <h2>Result</h2>

      <pre id="result"></pre>

    </section>

  </main>

  <script type="module" src="./src/app.js"></script>

</body>
</html>
